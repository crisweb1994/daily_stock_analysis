version: "3.8"

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: unless-stopped
  env_file:
    - .env
  environment:
    - TZ=Asia/Shanghai
    - WEBUI_HOST=0.0.0.0
    - API_PORT=${API_PORT:-8000}
  volumes:
    - dsa-data:/app/data
    - dsa-logs:/app/logs
    - dsa-reports:/app/reports

services:
  # 定时任务服务：负责按计划执行每日分析
  analyzer:
    <<: *common
    command: ["python", "main.py", "--schedule"]

  # Web/API 服务：提供 WebUI 和 API
  server:
    <<: *common
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "${API_PORT:-8000}"]
    # Dokploy 官方更推荐在 Compose 场景下使用“单值端口”并通过 Domains 页做转发
    ports:
      - "${API_PORT:-8000}"

volumes:
  dsa-data:
  dsa-logs:
  dsa-reports:
